<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 5px;
            background: transparent;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        /* Container: Ramping, Panjang, dan Sangat Presisi */
        .overlay-card {
            background: rgba(5, 5, 5, 0.75); /* Gelap Solid */
            width: 110px; 
            padding: 15px 12px; /* Padding ditingkatkan agar lebih panjang */
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px; /* Jarak antar baris dibuat rata dan pas */
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            line-height: 1;
        }

        /* Teks Lebih Besar & Bersih (Tanpa Neon/Shadow) */
        .label { 
            font-size: 11px; /* Ukuran teks diperbesar */
            font-weight: 900; 
            text-transform: uppercase;
        }
        
        .gpu  { color: #3399ff; }
        .cpu  { color: #ff3333; }
        .ram  { color: #ff66b2; }
        .pwr  { color: #ffffff; opacity: 0.6; }
        .fps  { color: #00ff00; } /* Teks FPS Tetap Hijau */

        /* Nilai Putih Besar & Solid */
        .val {
            color: #ffffff;
            font-size: 13px; /* Ukuran angka diperbesar */
            font-weight: 900;
        }

        /* Grafik Biru Tanpa Neon */
        .graph-container {
            width: 100%;
            height: 12px;
            margin-top: 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 5px;
        }

        #fpsLine {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="overlay-card">
        <!-- Baris-baris Statistik yang Rata -->
        <div class="stat-row">
            <span class="label gpu">GPU</span>
            <span class="val"><span id="gpu-v">88</span>%</span>
        </div>

        <div class="stat-row">
            <span class="label cpu">CPU</span>
            <span class="val"><span id="cpu-v">57</span>%</span>
        </div>

        <div class="stat-row">
            <span class="label ram">RAM</span>
            <span class="val"><span id="ram-v">81</span>%</span>
        </div>

        <div class="stat-row">
            <span class="label pwr">PWR</span>
            <span class="val"><span id="pwr-v">8.7</span>W</span>
        </div>

        <div class="stat-row">
            <span class="label fps">FPS</span>
            <span class="val" id="fps-t">0</span>
        </div>

        <!-- Grafik Biru Presisi -->
        <div class="graph-container">
            <canvas id="fpsLine"></canvas>
        </div>
    </div>

<script>
    const fpsText = document.getElementById('fps-t');
    const canvas = document.getElementById('fpsLine');
    const ctx = canvas.getContext('2d');

    let frames = 0;
    let lastTime = performance.now();
    let fpsHistory = new Array(25).fill(60);

    function update() {
        frames++;
        let now = performance.now();
        if (now - lastTime >= 1000) {
            let currentFPS = Math.round((frames * 1000) / (now - lastTime));
            fpsText.innerText = currentFPS;
            
            fpsHistory.push(currentFPS);
            fpsHistory.shift();
            drawGraph();

            // Simulasi Update Data Hardware
            document.getElementById('gpu-v').innerText = Math.floor(Math.random() * 3) + 87;
            document.getElementById('cpu-v').innerText = Math.floor(Math.random() * 5) + 55;
            document.getElementById('ram-v').innerText = Math.floor(Math.random() * 2) + 80;
            document.getElementById('pwr-v').innerText = (Math.random() * 0.4 + 8.4).toFixed(1);

            frames = 0;
            lastTime = now;
        }
        requestAnimationFrame(update);
    }

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#3399ff"; // Biru Solid
        ctx.lineWidth = 2; 
        ctx.beginPath();

        let slice = canvas.width / (fpsHistory.length - 1);
        for (let i = 0; i < fpsHistory.length; i++) {
            let x = i * slice;
            let maxFps = Math.max(...fpsHistory, 60); 
            let y = canvas.height - (fpsHistory[i] / maxFps * canvas.height);

            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // Set Ukuran Canvas agar Tajam
    canvas.width = 90;
    canvas.height = 12;
    update();
</script>

</body>
</html>
